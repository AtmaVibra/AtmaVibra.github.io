// --------------------------------------------------
// ESCENA
// --------------------------------------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Fondo
const fondoTexture = new THREE.TextureLoader().load("textures/fondo.jpg");
const fondoGeometry = new THREE.PlaneGeometry(30, 20);
const fondoMaterial = new THREE.MeshBasicMaterial({ map: fondoTexture, side: THREE.DoubleSide });
const fondo = new THREE.Mesh(fondoGeometry, fondoMaterial);
fondo.position.set(0, 0, -8);
scene.add(fondo);

// Luz
scene.add(new THREE.PointLight(0xffffff, 2, 20).position.set(2, 4, 5));
scene.add(new THREE.AmbientLight(0x888888));

// --------------------------------------------------
// PARTICULAS
// --------------------------------------------------
const particleCount = 200;
const particlesGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    positions[i*3]   = (Math.random() - 0.5) * 10;
    positions[i*3+1] = Math.random() * 5 - 1;
    positions[i*3+2] = (Math.random() - 0.5) * 10;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({ color: 0xffd700, size: 0.05 });
scene.add(new THREE.Points(particlesGeometry, particlesMaterial));

// --------------------------------------------------
// COMECOS
// --------------------------------------------------
const group = new THREE.Group();
scene.add(group);

const loader = new THREE.TextureLoader();

const colores = [
    "textures/color1.jpg",
    "textures/color2.jpg",
    "textures/color3.jpg",
    "textures/color4.jpg"
];

const iconos = [
    "textures/sol.png",
    "textures/luna.png",
    "textures/ojo.png",
    "textures/loto.png"
];

const flaps = [];

for (let i = 0; i < 4; i++) {
    const flapGroup = new THREE.Group();

    const baseGeo = new THREE.PlaneGeometry(1.8, 1.8);
    const baseMat = new THREE.MeshPhongMaterial({ map: loader.load(colores[i]), side: THREE.DoubleSide });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.rotation.x = -Math.PI / 2;

    const iconGeo = new THREE.PlaneGeometry(1.0, 1.0);
    const iconMat = new THREE.MeshBasicMaterial({ map: loader.load(iconos[i]), transparent: true });
    const icon = new THREE.Mesh(iconGeo, iconMat);
    icon.position.set(0, 0.01, 0);
    icon.rotation.x = -Math.PI / 2;

    flapGroup.add(base);
    flapGroup.add(icon);

    const angle = i * Math.PI / 2;
    flapGroup.position.set(Math.cos(angle) * 1.2, 0, Math.sin(angle) * 1.2);
    flapGroup.lookAt(0, 0, 0);

    group.add(flapGroup);
    flaps.push(flapGroup);
}

// --------------------------------------------------
// ANIMACIÓN
// --------------------------------------------------
let t = 0;
let foldProgress = 0;
let foldDirection = 0;

function animate() {
    requestAnimationFrame(animate);

    t += 0.01;
    group.position.y = Math.sin(t * 0.7) * 0.1;
    group.rotation.y += 0.003;

    if (foldDirection !== 0) {
        foldProgress += foldDirection * 0.05;
        foldProgress = Math.max(0, Math.min(1, foldProgress));

        const angle = foldProgress * (Math.PI / 3);
        flaps.forEach((fg, idx) => {
            fg.rotation.x = (idx % 2 === 0 ? 1 : -1) * angle;
        });

        if (foldProgress === 0 || foldProgress === 1) foldDirection = 0;
    }

    renderer.render(scene, camera);
}
animate();

// --------------------------------------------------
// LÓGICA
// --------------------------------------------------
const opcionesDiv = document.getElementById("opciones");
const mensajeFinal = document.getElementById("mensajeFinal");
const volverBtn = document.getElementById("volver");

function mostrarOpciones(lista, callback) {
    opcionesDiv.style.display = "flex";
    opcionesDiv.innerHTML = "";
    lista.forEach(op => {
        const btn = document.createElement("div");
        btn.className = "btn";
        btn.textContent = op;
        btn.onclick = () => callback(op);
        opcionesDiv.appendChild(btn);
    });
}

function abrirCerrar(veces, callback) {
    let count = 0;
    function ciclo() {
        if (count >= veces) return callback();
        foldDirection = 1;
        setTimeout(() => {
            foldDirection = -1;
            setTimeout(() => {
                count++;
                ciclo();
            }, 300);
        }, 300);
    }
    ciclo();
}

mostrarOpciones(["Sol", "Luna", "Ojo", "Loto"], elegirColor);

function elegirColor(color) {
    abrirCerrar(color.length, () => {
        mostrarOpciones(["1", "2", "3", "4"], elegirNumero1);
    });
}

function elegirNumero1(num) {
    abrirCerrar(parseInt(num), () => {
        mostrarOpciones(["1", "2", "3", "4"], elegirNumero2);
    });
}

function elegirNumero2(num) {
    abrirCerrar(parseInt(num), () => {
        const frase = frases[Math.floor(Math.random() * frases.length)];
        opcionesDiv.style.display = "none";
        mensajeFinal.textContent = frase;
        mensajeFinal.style.display = "block";
        volverBtn.style.display = "block";
    });
}

function volverWeb() {
    window.location.href = "../index.html";
}

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
