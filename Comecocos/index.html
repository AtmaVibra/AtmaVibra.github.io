  html, body { height: 100%; margin: 0; background: black; font-family: Arial, sans-serif; color: white; }
  #instrucciones {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 30px; text-align: center; z-index: 20;
  }
  #btnJugar {
    padding: 14px 28px; background: gold; color: black; border: none;
    border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
  }
  #iconoSeleccionado {
    position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
    width: 140px; height: 140px; opacity: 0.95; display: none; z-index: 10;
  }
  #mensajeFinal {
    position: absolute; top: 22%; left: 50%; transform: translateX(-50%);
    width: 85%; max-width: 600px; padding: 22px;
    background: rgba(0,0,0,0.85); border-radius: 14px; text-align: center;
    font-size: 1.7rem; line-height: 1.4; display: none; z-index: 5;
    border: 1px solid rgba(255,215,0,0.8); box-shadow: 0 0 25px rgba(255,215,0,0.35);
  }
  #volver {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    padding: 12px 26px; background: gold; color: black; border-radius: 10px;
    font-weight: bold; cursor: pointer; display: none; z-index: 5; border: none;
  }
  #opciones {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    z-index: 5; width: 80%; max-width: 340px;
  }
  .btn {
    padding: 14px 18px; background: rgba(255,255,255,0.95);
    border: 2px solid gold; border-radius: 10px; cursor: pointer;
    font-size: 1.25rem; font-weight: bold; color: black; text-align: center;

</style>

  </p>
  <button id="btnJugar">Comenzar</button>

<img id="iconoSeleccionado" src="" alt="">
<div id="mensajeFinal"></div>
<button id="volver" onclick="location.reload()">Volver</button>
<div id="opciones"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    "Agradezco lo que soy, lo que tengo y lo que viene.",
     "Elijo vínculos que aporten paz en mi vida.",
     "Me permito descansar sin culpa.",
     "Merezco una vida feliz y abundante.",
     "Todo fluye mejor cuando confío.",
     "Me pasan cosas buenas constantemente.",
     "Todo se soluciona mejor de lo que esperaba.",

     "Hoy confío en lo que siento."

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.1, 4.0);
camera.lookAt(0, 1.1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio ? window.devicePixelRatio : 1);
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

// FONDO (ajustado para cubrir pantalla)
const fondo = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshBasicMaterial({
    map: loader.load("textures/fondo.jpg"),
    side: THREE.DoubleSide
  })
);
fondo.position.set(0, 0, -10);
scene.add(fondo);

// LUCES
const pLight = new THREE.PointLight(0xffffff, 1.8);
pLight.position.set(3, 5, 6);
scene.add(pLight);
scene.add(new THREE.AmbientLight(0xaaaaaa));

// PARTICULAS
const particlesCount = 200;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 6;
  positions[i*3+1] = Math.random() * 4 - 1;
  positions[i*3+2] = -3 - Math.random() * 3;
}
const particlesGeometry = new THREE.BufferGeometry();
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particles = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({
  color: 0xffd700, size: 0.05, transparent: true, opacity: 0.8
}));
scene.add(particles);

// COMECOS (grupo principal)
const group = new THREE.Group();
scene.add(group);

// RUTAS (asegúrate que los archivos existen exactamente con estos nombres)
const colores = [
  "textures/color1.jpg",
  "textures/color2.jpg",
  "textures/color3.jpg",
  "textures/color4.jpg"
];
const iconos = [
  "textures/sol.png",
  "textures/luna.png",
  "textures/ojo.png",
  "textures/loto.png"
];

const flaps = [];

// BLOQUE DEFINITIVO: fondos + iconos exteriores e interiores + sombras + separación y renderOrder
for (let i = 0; i < 4; i++) {
  const flapGroup = new THREE.Group();

  // Fondo (plano base)
  const baseMat = new THREE.MeshPhongMaterial({
    map: loader.load(colores[i]),
    side: THREE.DoubleSide
  });
  const base = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), baseMat);
  base.position.z = 0;

  // Sombra exterior (ligera, delante)
  const shadowOutMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35, depthWrite: false });
  const shadowOut = new THREE.Mesh(new THREE.PlaneGeometry(0.78, 0.78), shadowOutMat);
  shadowOut.renderOrder = 2;
  shadowOut.position.z = 0.06;

  // Icono exterior (por delante)
  const iconOutTex = loader.load(iconos[i]);
  const iconOutMat = new THREE.MeshBasicMaterial({ map: iconOutTex, transparent: true, depthWrite: false, depthTest: false });
  const iconOut = new THREE.Mesh(new THREE.PlaneGeometry(0.65, 0.65), iconOutMat);
  iconOut.renderOrder = 3;
  iconOut.position.z = 0.07;

  // Sombra interior (ligera, detrás)
  const shadowInMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35, depthWrite: false });
  const shadowIn = new THREE.Mesh(new THREE.PlaneGeometry(0.78, 0.78), shadowInMat);
  shadowIn.renderOrder = 2;
  shadowIn.position.z = -0.06;
  shadowIn.visible = false; // inicialmente oculto

  // Icono interior (por detrás), dado la vuelta (rotación Y)
  const iconInTex = loader.load(iconos[i]);
  const iconInMat = new THREE.MeshBasicMaterial({ map: iconInTex, transparent: true, depthWrite: false, depthTest: false });
  const iconIn = new THREE.Mesh(new THREE.PlaneGeometry(0.65, 0.65), iconInMat);
  iconIn.renderOrder = 3;
  iconIn.position.z = -0.07;
  iconIn.rotation.y = Math.PI; // dado la vuelta
  iconIn.visible = false; // inicialmente oculto

  // Añadir en orden: base (z=0), sombras e iconos con separación real
  flapGroup.add(base);
  flapGroup.add(shadowOut);
  flapGroup.add(iconOut);
  flapGroup.add(shadowIn);
  flapGroup.add(iconIn);

  // Posición alrededor del centro (sin tocar tu orientación global)
  const angle = i * (Math.PI / 2);
  const radius = 0.75;
  flapGroup.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);

  // Orientar cada flap hacia fuera (manteniendo tu lookAt original)
  flapGroup.lookAt(Math.cos(angle) * 2, 0, Math.sin(angle) * 2);

  // Guardar referencias en objeto para manipular visibilidad fácilmente
  flapGroup.userData = {
    iconOut,
    iconIn,
    shadowOut,
    shadowIn
  };

  group.add(flapGroup);
  flaps.push(flapGroup);
}

// Mantener tu inclinación EXACTA y escala
group.position.y = 1.0;
group.scale.set(0.8, 0.8, 0.8);
group.rotation.x = -0.14;

// PLEGADO (sin cambios)
let foldProgress = 0;
let foldDirection = 0;
const foldMaxAngle = Math.PI / 3;
let bloqueado = false;
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

// ANIMACIÓN
function animate() {
  requestAnimationFrame(animate);

  // rotación continua del grupo
  group.rotation.y += 0.01;

  // plegado con easing
  if (foldDirection !== 0) {
    foldProgress += foldDirection * 0.03;
    foldProgress = Math.max(0, Math.min(1, foldProgress));
    const eased = easeInOutQuad(foldProgress);
    const angle = eased * foldMaxAngle;
    flaps.forEach((fg, idx) => fg.rotation.x = (idx % 2 === 0 ? 1 : -1) * angle);
  }

  // partículas
  const pos = particlesGeometry.attributes.position.array;
  for (let i = 0; i < particlesCount; i++) {
    pos[i * 3 + 1] += 0.01;
    if (pos[i * 3 + 1] > 3) pos[i * 3 + 1] = -1 - Math.random() * 2;
  }
  particlesGeometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}
animate();

// LÓGICA DEL JUEGO (sin tocar estructura, solo comportamiento de iconos)
const opcionesDiv = document.getElementById("opciones");
const mensajeFinal = document.getElementById("mensajeFinal");
const volverBtn = document.getElementById("volver");
const instrucciones = document.getElementById("instrucciones");
const btnJugar = document.getElementById("btnJugar");
const iconoSeleccionado = document.getElementById("iconoSeleccionado");

btnJugar.onclick = () => {
  instrucciones.style.display = "none";
  mostrarOpciones(["Sol","Luna","Ojo","Loto"], elegirColor);
};

function mostrarOpciones(lista, callback) {
  opcionesDiv.style.display = "grid";
  opcionesDiv.innerHTML = "";
  lista.forEach(op => {
    const btn = document.createElement("div");
    btn.className = "btn";
    btn.textContent = op;
    btn.onclick = () => { if (!bloqueado) callback(op); };
    opcionesDiv.appendChild(btn);
  });
}

function abrirCerrar(veces, callback) {
  let count = 0;
  function ciclo() {
    if (count >= veces) { bloqueado = false; return callback(); }
    foldDirection = 1; foldProgress = 0;
    setTimeout(() => {
      foldDirection = -1; foldProgress = 1;
      setTimeout(() => { count++; ciclo(); }, 350);
    }, 350);
  }
  ciclo();
}

// NUEVO: comportamiento solicitado
function elegirColor(color) {
  bloqueado = true;
  const index = ["Sol","Luna","Ojo","Loto"].indexOf(color);
  // Mostrar imagen seleccionada en el elemento HTML (sin cambiar lógica visual del cubo)
  iconoSeleccionado.src = iconos[index];
  iconoSeleccionado.style.display = "block";

  // Primero, restaurar todos los flaps a estado por defecto:
  flaps.forEach(fg => {
    const { iconOut, iconIn, shadowOut, shadowIn } = fg.userData;
    iconOut.visible = true;
    shadowOut.visible = true;
    iconIn.visible = false;
    shadowIn.visible = false;
    // asegurar rotación interior dada la vuelta
    iconIn.rotation.y = Math.PI;
  });

  // Ahora, para el flap seleccionado: ocultar icono exterior y mostrar icono interior dado la vuelta
  const selected = flaps[index];
  if (selected) {
    const { iconOut, iconIn, shadowOut, shadowIn } = selected.userData;
    iconOut.visible = false;
    shadowOut.visible = false;
    iconIn.visible = true;
    shadowIn.visible = true;
    // asegurar que el icono interior esté dado la vuelta
    iconIn.rotation.y = Math.PI;
  }

  abrirCerrar(color.length, () => mostrarOpciones(["1","2","3","4"], elegirNumero1));
}

function elegirNumero1(num) {
  bloqueado = true;
  abrirCerrar(parseInt(num), () => mostrarOpciones(["1","2","3","4"], elegirNumero2));
}

function elegirNumero2(num) {
  bloqueado = true;
  abrirCerrar(parseInt(num), () => {
    mensajeFinal.textContent = frases[Math.floor(Math.random() * frases.length)];
    opcionesDiv.style.display = "none";
    mensajeFinal.style.display = "block";
    volverBtn.style.display = "block";
    bloqueado = false;
  });
}

// Ajuste de tamaño: recargar para mantener layout exacto (igual que tenías)
window.addEventListener("resize", () => location.reload());
</script>
