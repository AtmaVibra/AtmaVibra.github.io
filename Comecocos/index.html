    .btn {

        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1rem;
        transition: 0.3s;
        min-width: 90px;

    .btn:hover {

// --------------------------------------------------
// ESCENA 3D
// --------------------------------------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);
camera.position.set(0, 1.6, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Fondo cósmico
const fondoTexture = new THREE.TextureLoader().load("textures/fondo.jpg");
const fondoGeometry = new THREE.PlaneGeometry(30, 20);
const fondoMaterial = new THREE.MeshBasicMaterial({
    map: fondoTexture,
    side: THREE.DoubleSide
});
const fondo = new THREE.Mesh(fondoGeometry, fondoMaterial);
fondo.position.set(0, 0, -8);
scene.add(fondo);

// Luces (corregido: sin errores que rompan la escena)
const pointLight = new THREE.PointLight(0xffffff, 2, 30);
pointLight.position.set(3, 5, 6);
scene.add(pointLight);

const ambientLight = new THREE.AmbientLight(0x888888);
scene.add(ambientLight);

// --------------------------------------------------
// PARTÍCULAS DORADAS
// --------------------------------------------------
const particleCount = 220;
const particlesGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    positions[i*3]   = (Math.random() - 0.5) * 12;
    positions[i*3+1] = Math.random() * 6 - 1.5;
    positions[i*3+2] = (Math.random() - 0.5) * 10;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({
    color: 0xffd700,
    size: 0.06,
    transparent: true,
    opacity: 0.85
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// --------------------------------------------------
// COMECOS 3D (GRANDE, ICONOS GRANDES)
// --------------------------------------------------
const group = new THREE.Group();
scene.add(group);

const loader = new THREE.TextureLoader();

const colores = [
    "textures/color1.jpg",
    "textures/color2.jpg",
    "textures/color3.jpg",
    "textures/color4.jpg"
];

const iconos = [
    "textures/sol.png",
    "textures/luna.png",
    "textures/ojo.png",
    "textures/loto.png"
];

const flaps = [];

for (let i = 0; i < 4; i++) {
    const flapGroup = new THREE.Group();

    // Cara base (más grande)
    const baseGeo = new THREE.PlaneGeometry(2.4, 2.4);
    const baseMat = new THREE.MeshPhongMaterial({
        map: loader.load(colores[i]),
        side: THREE.DoubleSide
    });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.rotation.x = -Math.PI / 2;

    // Icono (mucho más grande)
    const iconGeo = new THREE.PlaneGeometry(1.6, 1.6);
    const iconMat = new THREE.MeshBasicMaterial({
        map: loader.load(iconos[i]),
        transparent: true
    });
    const icon = new THREE.Mesh(iconGeo, iconMat);
    icon.position.set(0, 0.02, 0);
    icon.rotation.x = -Math.PI / 2;

    flapGroup.add(base);
    flapGroup.add(icon);

    const angle = i * Math.PI / 2;
    flapGroup.position.set(Math.cos(angle) * 1.6, 0, Math.sin(angle) * 1.6);
    flapGroup.lookAt(0, 0, 0);

    group.add(flapGroup);
    flaps.push(flapGroup);
}

// Escala general del comecocos (más grande)
group.scale.set(1.2, 1.2, 1.2);

// --------------------------------------------------
// ANIMACIÓN (PLEGADO LENTO, MOVIMIENTO SUAVE)
// --------------------------------------------------
let t = 0;
let foldProgress = 0;
let foldDirection = 0; // -1 cerrando, 1 abriendo, 0 quieto

function animate() {
    requestAnimationFrame(animate);

    t += 0.01;

    // Movimiento suave del grupo (siempre centrado, pero vivo)
    group.position.y = Math.sin(t * 0.5) * 0.12;
    group.rotation.y += 0.0025;

    // Partículas flotando
    const pos = particlesGeometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        pos[i*3+1] += 0.002;
        if (pos[i*3+1] > 4) pos[i*3+1] = -2;
    }
    particlesGeometry.attributes.position.needsUpdate = true;

    // Plegado lento (C: plegado lento)
    if (foldDirection !== 0) {
        const speed = 0.03; // más lento
        foldProgress += foldDirection * speed;
        foldProgress = Math.max(0, Math.min(1, foldProgress));

        const angle = foldProgress * (Math.PI / 3); // hasta ~60º
        flaps.forEach((fg, idx) => {
            fg.rotation.x = (idx % 2 === 0 ? 1 : -1) * angle;
        });

        if (foldProgress === 0 || foldProgress === 1) {
            foldDirection = 0;
        }
    }

    renderer.render(scene, camera);
}
animate();

// --------------------------------------------------
// LÓGICA DEL JUEGO (MECÁNICA CLÁSICA)
// --------------------------------------------------
const opcionesDiv = document.getElementById("opciones");
const mensajeFinal = document.getElementById("mensajeFinal");
const volverBtn = document.getElementById("volver");

function mostrarOpciones(lista, callback) {
    opcionesDiv.style.display = "flex";
    opcionesDiv.innerHTML = "";
    lista.forEach(op => {
        const btn = document.createElement("div");
        btn.className = "btn";
        btn.textContent = op;
        btn.onclick = () => callback(op);
        opcionesDiv.appendChild(btn);
    });
}

// Animación de abrir/cerrar N veces
function abrirCerrar(veces, callback) {
    let count = 0;
    function ciclo() {
        if (count >= veces) {
            if (callback) callback();
            return;
        }
        foldDirection = 1;
        setTimeout(() => {
            foldDirection = -1;
            setTimeout(() => {
                count++;
                ciclo();
            }, 350); // tiempo plegado lento
        }, 350);
    }
    ciclo();
}

// Inicio: elegir color
mostrarOpciones(["Sol", "Luna", "Ojo", "Loto"], elegirColor);

function elegirColor(color) {
    const letras = color.length; // LUNA = 4, etc.
    abrirCerrar(letras, () => {
        mostrarOpciones(["1", "2", "3", "4"], elegirNumero1);
    });
}

function elegirNumero1(num) {
    const n = parseInt(num, 10);
    abrirCerrar(n, () => {
        mostrarOpciones(["1", "2", "3", "4"], elegirNumero2);
    });
}

function elegirNumero2(num) {
    const n = parseInt(num, 10);
    abrirCerrar(n, () => {
        const frase = frases[Math.floor(Math.random() * frases.length)];
        opcionesDiv.style.display = "none";
        mensajeFinal.textContent = frase;
        mensajeFinal.style.display = "block";
        volverBtn.style.display = "block";
    });
}

function volverWeb() {
    // Ajusta la ruta según tu estructura
    window.location.href = "../index.html";
}

// Responsive
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
