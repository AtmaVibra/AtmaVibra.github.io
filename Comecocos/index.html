<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Plegado Sagrado Atma</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  html, body { height:100%; margin:0; background:black; font-family:Arial, sans-serif; color:white; }
  #instrucciones { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px; text-align:center; z-index:20; }
  #btnJugar { padding:14px 28px; background:gold; color:black; border:none; border-radius:10px; font-size:1.2rem; font-weight:bold; cursor:pointer; }
  #iconoSeleccionado { position:absolute; top:6%; left:50%; transform:translateX(-50%); width:140px; height:140px; opacity:0.95; display:none; z-index:10; }
  #mensajeFinal { position:absolute; top:22%; left:50%; transform:translateX(-50%); width:85%; max-width:600px; padding:22px; background:rgba(0,0,0,0.85); border-radius:14px; text-align:center; font-size:1.7rem; line-height:1.4; display:none; z-index:5; border:1px solid rgba(255,215,0,0.8); box-shadow:0 0 25px rgba(255,215,0,0.35); }
  #volver { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); padding:12px 26px; background:gold; color:black; border-radius:10px; font-weight:bold; cursor:pointer; display:none; z-index:5; border:none; }
  #opciones { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); display:grid; grid-template-columns:repeat(2,1fr); gap:14px; z-index:5; width:80%; max-width:340px; }
  .btn { padding:14px 18px; background:rgba(255,255,255,0.95); border:2px solid gold; border-radius:10px; cursor:pointer; font-size:1.25rem; font-weight:bold; color:black; text-align:center; }
</style>
</head>
<body>

<div id="instrucciones">
  <h1>Mensaje Celestial<br>Atma</h1>
  <p>Elige un símbolo.<br>El plegado se abrirá y cerrará según su energía.<br>Después elige un número, y luego otro.<br><br>El mensaje final será tu<br>guía vibracional.</p>
  <button id="btnJugar">Comenzar</button>
</div>

<img id="iconoSeleccionado" src="" alt="">
<div id="mensajeFinal"></div>
<button id="volver" onclick="location.reload()">Volver</button>
<div id="opciones"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>


// --------------------------------------------------
// FRASES
// --------------------------------------------------
const frases = [
    "Hoy tu energía se expande hacia lo que deseas atraer.",
    "La abundancia fluye hacia ti cuando actúas desde la calma.",
    "Lo que buscas también te está buscando.",
    "Tu respiración es tu refugio.",
    "Acepta lo que llega, suelta lo que se va.",
    "El desapego abre caminos que el miedo no ve.",
    "Hoy eliges responder, no reaccionar.",
    "Tu intuición es más sabia de lo que crees.",
    "Eres tu primera prioridad, haz que fluya, y vendrá a tí.",
    "La calma no se busca, se permite.",
    "Confía en el proceso, incluso cuando no lo entiendas.",
    "Tu energía se alinea con lo que estás preparado para recibir.",
    "La calma que buscas ya vive dentro de ti.",
    "Hoy eliges caminar con suavidad y claridad.",
    "El universo te sostiene incluso cuando no lo ves.",
    "Respira: estás exactamente donde necesitas estar.",
    "Cada pensamiento consciente abre un nuevo camino.",
    "Tu alma sabe el ritmo perfecto para ti.",
    "Lo que hoy agradeces, mañana florece.",
    "El silencio también habla, si sabes escucharlo.",
    "Tu intuición es un faro que nunca se apaga.",
    "Hoy eliges confiar más que temer.",
    "El universo responde a tu vibración, no a tu prisa.",
    "Lo que sueltas te libera.",
    "Tu luz interior es más fuerte que cualquier duda.",
    "Cada respiración te devuelve a tu centro.",
    "Hoy eliges ver belleza en lo simple.",
    "Tu presencia transforma el espacio que habitas.",
    "El equilibrio llega cuando dejas de forzarlo.",
    "Tu paz es tu mayor riqueza.",
    "Hoy eliges avanzar sin cargar lo que pesa.",
    "El universo abre puertas cuando tú abres tu corazón.",
    "Tu energía crea tu realidad.",
    "Lo que hoy aceptas deja de limitarte.",
    "Cada día es una oportunidad para renacer.",
    "Tu alma no tiene prisa.",
    "Hoy eliges escuchar más a tu interior.",
    "La claridad llega cuando la mente se aquieta.",
    "Tu camino se ilumina paso a paso.",
    "Lo que te inspira te guía.",
    "Hoy eliges soltar el control y abrazar la confianza.",
    "Tu vibración atrae lo que mereces.",
    "El amor propio es tu brújula.",
    "Cada emoción trae un mensaje.",
    "Hoy eliges ver posibilidades donde antes veías límites.",
    "Tu calma es un acto de amor hacia ti mismo.",
    "El universo conspira a favor de tu expansión.",
    "Lo que te hace bien, te hace crecer.",
    "Hoy eliges ser tu propio refugio.",
    "Tu luz interior nunca se apaga.",
    "Cada paso consciente es un paso hacia tu verdad.",
    "Hoy eliges honrar tu energía.",
    "Tu alma recuerda lo que tu mente olvida.",
    "Lo que hoy siembras, mañana florece.",
    "Hoy eliges respirar antes de reaccionar.",
    "Tu intuición siempre te muestra el camino correcto.",
    "El universo te escucha cuando hablas con el corazón.",
    "Hoy eliges confiar en el proceso.",
    "Tu energía es medicina.",
    "Cada día puedes empezar de nuevo.",
    "Hoy eliges soltar lo que ya no vibra contigo.",
    "Tu calma abre caminos invisibles.",
    "El universo te acompaña en cada paso.",
    "Hoy eliges ver con los ojos del alma.",
    "Tu vibración es tu lenguaje más poderoso.",
    "Lo que te trae paz es tu verdadero camino.",
    "Hoy eliges agradecer incluso lo pequeño.",
    "Tu alma siempre sabe hacia dónde ir.",
    "Cada respiración te acerca a tu esencia.",
    "Hoy eliges ser amable contigo mismo.",
    "Tu luz interior guía tu camino.",
    "El universo responde a tu autenticidad.",
    "Hoy eliges confiar en tu proceso interno.",
    "Tu energía crea tu experiencia.",
    "Cada día es una oportunidad para expandirte.",
    "Hoy eliges escuchar tu intuición.",
    "Tu calma es tu superpoder.",
    "El universo te sostiene en cada decisión.",
    "Hoy eliges avanzar con suavidad.",
    "Tu alma vibra en armonía con lo que amas.",
    "Cada pensamiento consciente transforma tu realidad.",
    "Hoy eliges ver la magia en lo cotidiano.",
    "Tu energía atrae lo que resuena contigo.",
    "Hoy eliges caminar con presencia.",
    "Tu luz interior ilumina tu camino.",
    "Cada respiración te devuelve a tu centro.",
    "Hoy eliges ser tu propio hogar.",
    "Tu calma es tu fortaleza.",
    "El universo te sostiene."
];

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.1, 4.0);
camera.lookAt(0, 1.1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio || 1);
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

// FONDO: plano que se escala para cubrir la pantalla
const fondoGeom = new THREE.PlaneGeometry(1, 1);
const fondoMat = new THREE.MeshBasicMaterial({ map: loader.load("textures/fondoatma.jpg"), side: THREE.DoubleSide });
const fondo = new THREE.Mesh(fondoGeom, fondoMat);
fondo.position.set(0, 0, -10);
scene.add(fondo);

function updateFondoScale() {
  const dist = Math.abs(camera.position.z - fondo.position.z);
  const vFOV = THREE.Math.degToRad(camera.fov);
  const height = 2 * Math.tan(vFOV / 2) * dist;
  const width = height * (window.innerWidth / window.innerHeight);
  fondo.scale.set(width, height, 1);
}
updateFondoScale();

// LUCES
const pLight = new THREE.PointLight(0xffffff, 1.8);
pLight.position.set(3, 5, 6);
scene.add(pLight);
scene.add(new THREE.AmbientLight(0xaaaaaa));

// PARTICULAS
const particlesCount = 200;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 6;
  positions[i*3+1] = Math.random() * 4 - 1;
  positions[i*3+2] = -3 - Math.random() * 3;
}
const particlesGeometry = new THREE.BufferGeometry();
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particles = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ color: 0xffd700, size: 0.05, transparent: true, opacity: 0.8 }));
scene.add(particles);

// GRUPO PRINCIPAL
const group = new THREE.Group();
scene.add(group);

// RUTAS (asegúrate que existen con estos nombres exactos)
const colores = ["textures/color1.jpg","textures/color2.jpg","textures/color3.jpg","textures/color4.jpg"];
const iconos = ["textures/sol.png","textures/luna.png","textures/ojo.png","textures/loto.png"];

const flaps = [];
const flapBases = []; // para raycasting/occlusion

// Crear flaps: fondo + sombra exterior + icono exterior + sombra interior + icono interior
for (let i = 0; i < 4; i++) {
  const flapGroup = new THREE.Group();

  // base (fondo del flap)
  const baseMat = new THREE.MeshPhongMaterial({ map: loader.load(colores[i]), side: THREE.DoubleSide });
  const base = new THREE.Mesh(new THREE.PlaneGeometry(1,1), baseMat);
  base.position.z = 0;

  // sombra exterior (delante)
  const shadowOutMat = new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.35 });
  const shadowOut = new THREE.Mesh(new THREE.PlaneGeometry(0.78,0.78), shadowOutMat);
  shadowOut.position.z = 0.06;
  shadowOut.renderOrder = 2;

  // icono exterior (delante)
  const iconOutMat = new THREE.MeshBasicMaterial({ map: loader.load(iconos[i]), transparent:true });
  const iconOut = new THREE.Mesh(new THREE.PlaneGeometry(0.65,0.65), iconOutMat);
  iconOut.position.z = 0.07;
  iconOut.renderOrder = 3;

  // sombra interior (detrás)
  const shadowInMat = new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.35 });
  const shadowIn = new THREE.Mesh(new THREE.PlaneGeometry(0.78,0.78), shadowInMat);
  shadowIn.position.z = -0.06;
  shadowIn.renderOrder = 2;
  shadowIn.visible = false;

  // icono interior (detrás), dado la vuelta
  const iconInMat = new THREE.MeshBasicMaterial({ map: loader.load(iconos[i]), transparent:true });
  const iconIn = new THREE.Mesh(new THREE.PlaneGeometry(0.65,0.65), iconInMat);
  iconIn.position.z = -0.07;
  iconIn.rotation.y = Math.PI;
  iconIn.renderOrder = 3;
  iconIn.visible = false;

  flapGroup.add(base, shadowOut, iconOut, shadowIn, iconIn);

  // posición alrededor del centro (0=Sol,1=Luna,2=Ojo,3=Loto)
  const angle = i * (Math.PI / 2);
  const radius = 0.75;
  flapGroup.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
  flapGroup.lookAt(Math.cos(angle) * 2, 0, Math.sin(angle) * 2);

  // guardar referencias
  flapGroup.userData = { base, iconOut, iconIn, shadowOut, shadowIn };

  group.add(flapGroup);
  flaps.push(flapGroup);
  flapBases.push(base);
}

// Mantener inclinación y escala
group.position.y = 1.0;
group.scale.set(0.8,0.8,0.8);
group.rotation.x = -0.14;

// PLEGADO
let foldProgress = 0;
let foldDirection = 0;
const foldMaxAngle = Math.PI/3;
let bloqueado = false;
function easeInOutQuad(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

// RAYCASTER para comprobar oclusión
const raycaster = new THREE.Raycaster();
const tmpVec = new THREE.Vector3();

// selected index (-1 = none)
let selectedIndex = -1;

// función que comprueba si un punto en world está oculto desde la cámara por alguno de los planos base
function isOccludedFromCamera(worldPos, ignoreBase) {
  const camPos = camera.position.clone();
  const dir = worldPos.clone().sub(camPos);
  const dist = dir.length();
  dir.normalize();
  raycaster.set(camPos, dir);
  const intersects = raycaster.intersectObjects(flapBases, true);
  for (let inter of intersects) {
    if (inter.object === ignoreBase) continue;
    if (inter.distance < dist - 1e-4) return true;
  }
  return false;
}

// ANIMACIÓN
function animate() {
  requestAnimationFrame(animate);

  group.rotation.y += 0.01;

  if (foldDirection !== 0) {
    foldProgress += foldDirection * 0.03;
    foldProgress = Math.max(0, Math.min(1, foldProgress));
    const eased = easeInOutQuad(foldProgress);
    const angle = eased * foldMaxAngle;
    flaps.forEach((fg, idx) => fg.rotation.x = (idx % 2 === 0 ? 1 : -1) * angle);
  }

  // actualizar partículas
  const pos = particlesGeometry.attributes.position.array;
  for (let i = 0; i < particlesCount; i++) {
    pos[i*3+1] += 0.01;
    if (pos[i*3+1] > 3) pos[i*3+1] = -1 - Math.random()*2;
  }
  particlesGeometry.attributes.position.needsUpdate = true;

  // Control de visibilidad y oclusión para el flap seleccionado
  if (selectedIndex >= 0 && selectedIndex < flaps.length) {
    const fg = flaps[selectedIndex];
    const { iconIn, shadowIn, base } = fg.userData;
    iconIn.getWorldPosition(tmpVec);
    const occluded = isOccludedFromCamera(tmpVec, base);
    // si está ocluido por otros planos, ocultarlo; si no, mostrarlo
    iconIn.visible = !occluded;
    shadowIn.visible = !occluded;
    // comprobar si la cámara está en el lado interior aproximando por la normal del flap
    const normal = new THREE.Vector3(0,0,1).applyQuaternion(fg.quaternion);
    const flapWorldPos = new THREE.Vector3();
    fg.getWorldPosition(flapWorldPos);
    const toCam = camera.position.clone().sub(flapWorldPos);
    const camInside = normal.dot(toCam) < 0;
    if (iconIn.visible && camInside) {
      iconIn.material.depthTest = false;
      shadowIn.material.depthTest = false;
      iconIn.renderOrder = 100;
      shadowIn.renderOrder = 90;
    } else {
      iconIn.material.depthTest = true;
      shadowIn.material.depthTest = true;
      iconIn.renderOrder = 3;
      shadowIn.renderOrder = 2;
    }
  }

  renderer.render(scene, camera);
}
animate();

// JUEGO (sin tocar estructura, solo comportamiento)
const opcionesDiv = document.getElementById("opciones");
const mensajeFinal = document.getElementById("mensajeFinal");
const volverBtn = document.getElementById("volver");
const instrucciones = document.getElementById("instrucciones");
const btnJugar = document.getElementById("btnJugar");
const iconoSeleccionado = document.getElementById("iconoSeleccionado");

btnJugar.onclick = () => {
  instrucciones.style.display = "none";
  mostrarOpciones(["Sol","Luna","Ojo","Loto"], elegirColorByIndex);
};

function mostrarOpciones(lista, callback) {
  opcionesDiv.style.display = "grid";
  opcionesDiv.innerHTML = "";
  lista.forEach((op, idx) => {
    const btn = document.createElement("div");
    btn.className = "btn";
    btn.textContent = op;
    btn.onclick = () => { if (!bloqueado) callback(idx); };
    opcionesDiv.appendChild(btn);
  });
}

function abrirCerrar(veces, callback) {
  let count = 0;
  function ciclo() {
    if (count >= veces) { bloqueado = false; return callback(); }
    foldDirection = 1; foldProgress = 0;
    setTimeout(() => {
      foldDirection = -1; foldProgress = 1;
      setTimeout(() => { count++; ciclo(); }, 350);
    }, 350);
  }
  ciclo();
}

// NUEVO: elegir por índice (robusto y seguro). Solo el seleccionado se mueve al interior.
function elegirColorByIndex(index) {
  bloqueado = true;

  if (typeof index !== 'number' || index < 0 || index >= flaps.length) {
    // restaurar por seguridad
    selectedIndex = -1;
    flaps.forEach(fg => {
      const { iconOut, iconIn, shadowOut, shadowIn } = fg.userData;
      iconOut.visible = true;
      shadowOut.visible = true;
      iconIn.visible = false;
      shadowIn.visible = false;
      iconIn.rotation.y = Math.PI;
    });
    abrirCerrar(1, () => mostrarOpciones(["1","2","3","4"], elegirNumero1));
    return;
  }

  // mostrar en el HTML el icono seleccionado
  iconoSeleccionado.src = iconos[index];
  iconoSeleccionado.style.display = "block";

  // Restaurar todos los flaps a estado por defecto
  flaps.forEach(fg => {
    const { iconOut, iconIn, shadowOut, shadowIn } = fg.userData;
    iconOut.visible = true;
    shadowOut.visible = true;
    iconIn.visible = false;
    shadowIn.visible = false;
    iconIn.rotation.y = Math.PI;
    iconIn.material.depthTest = true;
    shadowIn.material.depthTest = true;
    iconOut.material.depthTest = true;
    shadowOut.material.depthTest = true;
    iconIn.renderOrder = 3;
    shadowIn.renderOrder = 2;
  });

  // Solo el flap seleccionado: ocultar exterior y preparar interior (dado la vuelta)
  const selected = flaps[index];
  const { iconOut, iconIn, shadowOut, shadowIn } = selected.userData;
  iconOut.visible = false;
  shadowOut.visible = false;
  // marcamos iconIn visible; su visibilidad final se decidirá en animate() por oclusión
  iconIn.visible = true;
  shadowIn.visible = true;
  iconIn.rotation.y = Math.PI;

  // actualizar selectedIndex para la lógica de oclusión en animate()
  selectedIndex = index;

  // abrir/cerrar con número de ciclos igual a index+1 (mantiene variación)
  abrirCerrar(index + 1, () => mostrarOpciones(["1","2","3","4"], elegirNumero1));
}

function elegirNumero1(num) {
  bloqueado = true;
  abrirCerrar(parseInt(num), () => mostrarOpciones(["1","2","3","4"], elegirNumero2));
}

function elegirNumero2(num) {
  bloqueado = true;
  abrirCerrar(parseInt(num), () => {
    mensajeFinal.textContent = frases[Math.floor(Math.random() * frases.length)];
    opcionesDiv.style.display = "none";
    mensajeFinal.style.display = "block";
    volverBtn.style.display = "block";
    bloqueado = false;
  });
}

// Resize: actualizar renderer, cámara y fondo
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  updateFondoScale();
});
</script>
</body>
</html>
