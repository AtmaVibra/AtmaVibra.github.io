<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Mensaje Celestial Atma</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
  }

  #instrucciones {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px;
    text-align: center;
    z-index: 20;
  }

  #instrucciones h1 {
    font-size: 2rem;
    margin-bottom: 20px;
    color: gold;
  }

  #instrucciones p {
    font-size: 1.1rem;
    line-height: 1.5;
    max-width: 480px;
    margin-bottom: 30px;
  }

  #btnJugar {
    padding: 14px 28px;
    background: gold;
    color: black;
    border: none;
    border-radius: 10px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
  }

  #iconoSeleccionado {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 140px;
    opacity: 0.9;
    display: none;
    z-index: 10;
  }

  #mensajeFinal {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-width: 600px;
    padding: 22px;
    background: rgba(0,0,0,0.85);
    border-radius: 14px;
    text-align: center;
    font-size: 1.7rem;
    line-height: 1.4;
    display: none;
    z-index: 5;
    border: 1px solid rgba(255,215,0,0.8);
    box-shadow: 0 0 25px rgba(255,215,0,0.35);
  }

  #volver {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 26px;
    background: gold;
    color: black;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    display: none;
    z-index: 5;
    border: none;
    font-size: 1rem;
  }

  #opciones {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    z-index: 5;
    width: 80%;
    max-width: 340px;
  }

  .btn {
    padding: 14px 18px;
    background: rgba(255,255,255,0.9);
    border: 2px solid gold;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.25rem;
    transition: 0.3s;
    text-align: center;
    color: black;
    font-weight: bold;
  }

  .btn:hover {
    background: gold;
    color: black;
  }
</style>
</head>

<body>

<div id="instrucciones">
  <h1>Plegado Sagrado Atma</h1>
  <p>
    Elige un símbolo. El plegado se abrirá y cerrará según su energía.<br>
    Después elige un número, y luego otro.<br>
    El mensaje final será tu guía vibracional del momento.
  </p>
  <button id="btnJugar">Comenzar</button>
</div>

<img id="iconoSeleccionado" src="" alt="seleccionado">

<div id="mensajeFinal"></div>
<button id="volver" onclick="volverWeb()">Volver</button>
<div id="opciones"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// FRASES

  "Tu intuición es más sabia de lo que crees.",
  "La calma no se busca, se permite.",
  "Confía en el proceso, incluso cuando no lo entiendas."
  "Tu energía se alinea con lo que estás preparado para recibir.",
    "La calma que buscas ya vive dentro de ti.",

    "El universo te sostiene incluso cuando no lo ves.",

    "Tu alma sabe el ritmo perfecto para ti.",

    "Tu alma no tiene prisa.",

    "Tu camino se ilumina paso a paso.",
    "Lo que te inspira te guía.",
    "Hoy eliges soltar el control y abrazar la confianza.",
    "Tu vibración atrae lo que mereces.",
    "El amor propio es tu brújula.",
    "Cada emoción trae un mensaje.",
    "Hoy eliges ver posibilidades donde antes veías límites.",
    "Tu calma es un acto de amor hacia ti mismo.",
    "El universo conspira a favor de tu expansión.",
    "Lo que te hace bien, te hace crecer.",
    "Hoy eliges ser tu propio refugio.",
    "Tu luz interior nunca se apaga.",
    "Cada paso consciente es un paso hacia tu verdad.",
    "Hoy eliges honrar tu energía.",
    "Tu alma recuerda lo que tu mente olvida.",
    "Lo que hoy siembras, mañana florece.",

    "Tu intuición siempre te muestra el camino correcto.",
    "El universo te escucha cuando hablas con el corazón.",

    "Tu energía es medicina.",
    "Cada día puedes empezar de nuevo.",
    "Hoy eliges soltar lo que ya no vibra contigo.",
    "Tu calma abre caminos invisibles.",
    "El universo te acompaña en cada paso.",
    "Hoy eliges ver con los ojos del alma.",
    "Tu vibración es tu lenguaje más poderoso.",
    "Lo que te trae paz es tu verdadero camino.",
    "Hoy eliges agradecer incluso lo pequeño.",
    "Tu alma siempre sabe hacia dónde ir.",
    "Cada respiración te acerca a tu esencia.",
    "Hoy eliges ser amable contigo mismo.",
    "Tu luz interior guía tu camino.",
    "El universo responde a tu autenticidad.",

    "Cada día es una oportunidad para expandirte.",

    "Hoy eliges avanzar con suavidad.",
    "Tu alma vibra en armonía con lo que amas.",

    "Hoy eliges ver la magia en lo cotidiano.",
    "Tu energía atrae lo que resuena contigo.",
    "Hoy eliges caminar con presencia.",
    "Tu luz interior ilumina tu camino.",
    "Cada respiración te devuelve a tu centro.",
    "Hoy eliges ser tu propio hogar.",
    "Tu calma es tu fortaleza.",
    "El universo te sostiene.",
    "Me atrevo a salir de mi zona de confort.",
    "El dinero viene a mí con facilidad.",
    "Las oportunidades llegan a mí en el momento perfecto.",
    "Todo se me da mejor de lo que imaginaba.",
    "La abundancia fluye hacia mí sin esfuerzo.",
    "La vida me sorprende con cosas buenas.",
    "Estoy en el lugar correcto, en el momento correcto.",
    "Lo que deseo también me está buscando.",
    "Todo empieza a encajar a mi favor.",
    "Agradezco lo que soy, lo que tengo y lo que viene.",
     "Elijo vínculos que aporten paz en mi vida.",
     "Me permito descansar sin culpa.",
     "Merezco una vida feliz y abundante.",
     "Todo fluye mejor cuando confío.",
     "Me pasan cosas buenas constantemente.",
     "Todo se soluciona mejor de lo que esperaba.",
     "Ser feliz es mucho más fácil de lo que me imagino.",
     "Hoy confío en lo que siento."
];


// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 1.1, 4.0);
camera.lookAt(0, 1.1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

// Fondo
const fondoTexture = loader.load("textures/fondo.jpg");
const fondo = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 20),
  new THREE.MeshBasicMaterial({ map: fondoTexture, side: THREE.DoubleSide })
);
fondo.position.set(0, 0, -8);
scene.add(fondo);

// Luces (corregido)
const pLight = new THREE.PointLight(0xffffff, 2);
pLight.position.set(3, 5, 6);
scene.add(pLight);
const ambient = new THREE.AmbientLight(0xaaaaaa);
scene.add(ambient);

// Partículas doradas
const particlesCount = 200;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount; i++) {
  positions[i * 3 + 0] = (Math.random() - 0.5) * 6;
  positions[i * 3 + 1] = Math.random() * 4 - 1;
  positions[i * 3 + 2] = -3 - Math.random() * 3;
}
const particlesGeometry = new THREE.BufferGeometry();
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({
  color: 0xffd700,
  size: 0.05,
  transparent: true,
  opacity: 0.8
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// COMECOS
const group = new THREE.Group();
scene.add(group);

const colores = [
  "textures/color1.jpg",
  "textures/color2.jpg",
  "textures/color3.jpg",
  "textures/color4.jpg"
];

const iconos = [
  "textures/sol.png",
  "textures/luna.png",
  "textures/ojo.png",
  "textures/loto.png"
];

const flaps = [];

for (let i = 0; i < 4; i++) {
  const flapGroup = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.PlaneGeometry(0.95, 0.95),
    new THREE.MeshPhongMaterial({
      map: loader.load(colores[i]),
      side: THREE.DoubleSide
    })
  );
  base.rotation.x = -Math.PI / 2;

  const icon = new THREE.Mesh(
    new THREE.PlaneGeometry(0.65, 0.65),
    new THREE.MeshBasicMaterial({
      map: loader.load(iconos[i]),
      transparent: true
    })
  );
  icon.position.set(0, 0.02, 0);
  icon.rotation.x = -Math.PI / 2;

  flapGroup.add(base);
  flapGroup.add(icon);

  const angle = i * Math.PI / 2;
  flapGroup.position.set(Math.cos(angle) * 0.75, 0, Math.sin(angle) * 0.75);
  flapGroup.lookAt(0, 0, 0);

  group.add(flapGroup);
  flaps.push(flapGroup);
}

// posición / escala / inclinación
group.position.y = 1.0;
group.scale.set(0.6, 0.6, 0.6);
group.rotation.x = -0.14;

// ANIMACIÓN PLEGADO
let foldProgress = 0;
let foldDirection = 0;
const foldMaxAngle = Math.PI / 3;

function easeInOutQuad(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

// BLOQUEO DE INTERACCIÓN
let bloqueado = false;

// ANIMACIÓN PRINCIPAL
function animate() {
  requestAnimationFrame(animate);

  // rotación moderada continua
  group.rotation.y += 0.01;

  // plegado con easing
  if (foldDirection !== 0) {
    foldProgress += foldDirection * 0.03;
    if (foldProgress <= 0) {
      foldProgress = 0;
      foldDirection = 0;
    }
    if (foldProgress >= 1) {
      foldProgress = 1;
      foldDirection = 0;
    }
    const eased = easeInOutQuad(foldProgress);
    const angle = eased * foldMaxAngle;
    flaps.forEach((fg, idx) => {
      fg.rotation.x = (idx % 2 === 0 ? 1 : -1) * angle;
    });
  }

  // partículas
  const pos = particlesGeometry.attributes.position.array;
  for (let i = 0; i < particlesCount; i++) {
    pos[i * 3 + 1] += 0.01;
    if (pos[i * 3 + 1] > 3) {
      pos[i * 3 + 1] = -1 - Math.random() * 2;
    }
  }
  particlesGeometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}
animate();

// LÓGICA DEL JUEGO
const opcionesDiv = document.getElementById("opciones");
const mensajeFinal = document.getElementById("mensajeFinal");
const volverBtn = document.getElementById("volver");
const instrucciones = document.getElementById("instrucciones");
const btnJugar = document.getElementById("btnJugar");
const iconoSeleccionado = document.getElementById("iconoSeleccionado");

btnJugar.onclick = () => {
  instrucciones.style.display = "none";
  mostrarOpciones(["Sol", "Luna", "Ojo", "Loto"], elegirColor);
};

function mostrarOpciones(lista, callback) {
  opcionesDiv.style.display = "grid";
  opcionesDiv.innerHTML = "";
  lista.forEach(op => {
    const btn = document.createElement("div");
    btn.className = "btn";
    btn.textContent = op;
    btn.onclick = () => {
      if (bloqueado) return;
      callback(op);
    };
    opcionesDiv.appendChild(btn);
  });
}

function abrirCerrar(veces, callback) {
  let count = 0;
  function ciclo() {
    if (count >= veces) {
      bloqueado = false;
      return callback();
    }
    // abrir
    foldDirection = 1;
    foldProgress = 0;
    setTimeout(() => {
      // cerrar
      foldDirection = -1;
      foldProgress = 1;
      setTimeout(() => {
        count++;
        ciclo();
      }, 350);
    }, 350);
  }
  ciclo();
}

function elegirColor(color) {
  bloqueado = true;

  const index = ["Sol","Luna","Ojo","Loto"].indexOf(color);
  iconoSeleccionado.src = iconos[index];
  iconoSeleccionado.style.display = "block";

  abrirCerrar(color.length, () => {
    mostrarOpciones(["1", "2", "3", "4"], elegirNumero1);
  });
}

function elegirNumero1(num) {
  bloqueado = true;
  abrirCerrar(parseInt(num), () => {
    mostrarOpciones(["1", "2", "3", "4"], elegirNumero2);
  });
}

function elegirNumero2(num) {
  bloqueado = true;
  abrirCerrar(parseInt(num), () => {
    const frase = frases[Math.floor(Math.random() * frases.length)];
    opcionesDiv.style.display = "none";
    mensajeFinal.textContent = frase;
    mensajeFinal.style.display = "block";
    volverBtn.style.display = "block";
    bloqueado = false;
  });
}

function volverWeb() {
  window.location.href = "../index.html";
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
