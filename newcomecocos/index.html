<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Oráculo ATMA 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  html, body { height:100%; margin:0; background:black; overflow:hidden; font-family:Arial; }
  #instrucciones, #mensajeFinal, #volver, #opciones {
    position:absolute; left:50%; transform:translateX(-50%); z-index:10; text-align:center;
  }
  #instrucciones { top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; justify-content:center; }
  #btnJugar, .btn, #volver {
    padding:14px 22px; background:gold; color:black; border:none; border-radius:10px; font-weight:bold; cursor:pointer;
  }
  #opciones { bottom:40px; display:grid; grid-template-columns:repeat(2,1fr); gap:14px; width:80%; max-width:340px; }
  .btn { background:white; border:2px solid gold; }
  #mensajeFinal { top:20%; width:80%; max-width:500px; padding:20px; background:rgba(0,0,0,0.85); border-radius:12px; color:white; display:none; }
  #volver { bottom:30px; display:none; }
</style>
</head>
<body>

<div id="instrucciones">
  <h1>El Oráculo ATMA</h1>
  <p>Elige un símbolo. El plegado se abrirá y cerrará según su energía.</p>
  <button id="btnJugar">Comenzar</button>
</div>

<div id="mensajeFinal"></div>
<button id="volver" onclick="location.reload()">Volver</button>
<div id="opciones"></div>

<script src="three.min.js"></script>

<script>
// FRASES
const frases = [
  "Hoy tu energía se expande hacia lo que deseas atraer.",
  "La abundancia fluye hacia ti cuando actúas desde la calma.",
  "Hoy confío en lo que siento."
];

// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0.7, 4);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

// FONDO
const fondo = new THREE.Mesh(
  new THREE.PlaneGeometry(1,1),
  new THREE.MeshBasicMaterial({ map: loader.load("textures/fondoatma.jpg") })
);
fondo.position.z = -5;
scene.add(fondo);

function updateFondo() {
  const dist = Math.abs(camera.position.z - fondo.position.z);
  const h = 2 * Math.tan(THREE.Math.degToRad(camera.fov/2)) * dist;
  const w = h * (window.innerWidth/window.innerHeight);
  fondo.scale.set(w,h,1);
}
updateFondo();

// LUCES
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.PointLight(0xffffff, 1.2);
light.position.set(2,3,4);
scene.add(light);

// ORÁCULO
const oracle = new THREE.Group();
scene.add(oracle);

// TEXTURAS
const colores = [
  "textures/color1.jpg",
  "textures/color2.jpg",
  "textures/color3.jpg",
  "textures/color4.jpg"
];
const iconos = [
  "textures/sol.png",
  "textures/luna.png",
  "textures/ojo.png",
  "textures/loto.png"
];

// CREAR 4 PIRÁMIDES
const flapGroups = [];

for (let i=0; i<4; i++) {
  const flapGroup = new THREE.Group();

  const geom = new THREE.ConeGeometry(1, 1, 3);
  const mat = new THREE.MeshPhongMaterial({
    map: loader.load(colores[i]),
    side: THREE.DoubleSide
  });
  const flapMesh = new THREE.Mesh(geom, mat);
  flapMesh.rotation.x = Math.PI/2;

  const icon = new THREE.Mesh(
    new THREE.PlaneGeometry(0.9,0.9),
    new THREE.MeshBasicMaterial({ map: loader.load(iconos[i]), transparent:true })
  );
  icon.position.set(0,0.3,0);
  icon.lookAt(camera.position);

  flapGroup.add(flapMesh);
  flapGroup.add(icon);

  oracle.add(flapGroup);
  flapGroups.push(flapGroup);
}

// ANIMACIÓN
let fold = 0;
let dir = 0;

function animate() {
  requestAnimationFrame(animate);

  if (dir!==0) {
    fold += dir * 0.03;
    fold = Math.max(0, Math.min(1, fold));
  }

  const angle = fold * 0.9;

  flapGroups[0].rotation.x = -angle;
  flapGroups[2].rotation.x = angle;
  flapGroups[1].rotation.y = angle;
  flapGroups[3].rotation.y = -angle;

  renderer.render(scene, camera);
}
animate();

// JUEGO
const opcionesDiv = document.getElementById("opciones");
const mensajeFinal = document.getElementById("mensajeFinal");
const volverBtn = document.getElementById("volver");
const instrucciones = document.getElementById("instrucciones");
const btnJugar = document.getElementById("btnJugar");

let bloqueado = false;

btnJugar.onclick = () => {
  instrucciones.style.display = "none";
  mostrarOpciones(["Sol","Luna","Ojo","Loto"], elegirColor);
};

function mostrarOpciones(lista, callback) {
  opcionesDiv.style.display = "grid";
  opcionesDiv.innerHTML = "";
  lista.forEach((op, idx) => {
    const btn = document.createElement("div");
    btn.className = "btn";
    btn.textContent = op;
    btn.onclick = () => { if (!bloqueado) callback(idx); };
    opcionesDiv.appendChild(btn);
  });
}

function abrirCerrar(veces, callback) {
  let count = 0;
  bloqueado = true;
  function ciclo() {
    if (count >= veces) { bloqueado = false; return callback(); }
    dir = 1;
    setTimeout(() => {
      dir = -1;
      setTimeout(() => { count++; ciclo(); }, 350);
    }, 350);
  }
  ciclo();
}

function elegirColor(i) {
  abrirCerrar(i+1, () => mostrarOpciones(["1","2","3","4"], elegirNumero1));
}
function elegirNumero1(i) {
  abrirCerrar(i+1, () => mostrarOpciones(["1","2","3","4"], elegirNumero2));
}
function elegirNumero2(i) {
  abrirCerrar(i+1, () => {
    mensajeFinal.textContent = frases[Math.floor(Math.random()*frases.length)];
    opcionesDiv.style.display = "none";
    mensajeFinal.style.display = "block";
    volverBtn.style.display = "block";
  });
}

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  updateFondo();
});
</script>

</body>
</html>
